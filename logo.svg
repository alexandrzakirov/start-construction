<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <rect width="400" height="240" fill="white"/>

  <!-- Outer roof line (thick) -->
  <path d="M18,118 L200,12 L382,118"
        stroke="#111" stroke-width="7.5" fill="none"
        stroke-linecap="round" stroke-linejoin="miter"/>
  <!-- White fill between the two roof lines -->
  <path d="M18,118 L200,12 L382,118 L364,118 L200,30 L36,118 Z"
        fill="white"/>
  <!-- Inner roof line (thinner) -->
  <path d="M36,118 L200,30 L364,118"
        stroke="#111" stroke-width="3.5" fill="none"
        stroke-linecap="round" stroke-linejoin="miter"/>

  <!-- START -->
  <text x="200" y="186"
        text-anchor="middle"
        font-family="'Arial Black','Franklin Gothic Heavy','Impact',Arial,sans-serif"
        font-size="96" font-weight="900" font-style="italic"
        fill="#111" letter-spacing="-2">START</text>

  <!-- CONSTRUCTION -->
  <text x="200" y="220"
        text-anchor="middle"
        font-family="'Arial Black','Franklin Gothic Heavy','Impact',Arial,sans-serif"
        font-size="34" font-weight="900"
        fill="#111" letter-spacing="4">CONSTRUCTION</text>
</svg>
