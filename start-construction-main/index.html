<style>
/* ── RESET & BASE ─────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;overflow:hidden}
body{height:100%;overflow:hidden;background:#dde0e4;color:#1a1e24;font-family:'Syne',sans-serif;-webkit-font-smoothing:antialiased}

/* ── VARIABLES ───────────────────────────────────────── */
:root{
  --bg:#dde0e4;--surface:#e8eaed;--surface2:#d4d7db;
  --border:#c2c6cc;--border2:#adb2ba;
  --accent:#b56e00;--accent-dim:rgba(181,110,0,.13);
  --green:#166638;--green-dim:rgba(22,102,56,.13);
  --red:#b52a1c;--red-dim:rgba(181,42,28,.13);
  --yellow:#7a5500;--yellow-dim:rgba(122,85,0,.13);
  --blue:#1450a0;--blue-dim:rgba(20,80,160,.13);
  --text:#1a1e24;--muted:#7a8390;--muted2:#4a5260;
  --mono:'JetBrains Mono',monospace;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}

/* ── LAYOUT ──────────────────────────────────────────── */
.app{display:flex;flex-direction:column;height:100vh;height:100dvh}

/* STATUS BAR FILL */
.status-bar{
  height:var(--safe-top);
  background:var(--surface);
  flex-shrink:0;
}

/* TOP HEADER */
.top-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px 12px;
  background:#e8eaed;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.header-left{display:flex;align-items:center;gap:10px}
.header-logo{
  width:34px;height:34px;border-radius:8px;
  background:var(--accent-dim);border:1px solid rgba(245,166,35,.3);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:800;color:var(--accent);
}
.header-title{font-size:15px;font-weight:800}
.header-sub{font-size:10px;color:var(--muted2);font-family:var(--mono)}
.alert-pill{
  background:var(--red);color:#fff;
  font-size:11px;font-weight:700;font-family:var(--mono);
  padding:4px 10px;border-radius:20px;
  animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

/* SCROLL AREA */
.scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}

/* BOTTOM NAV */
.bottom-nav{
  display:flex;
  flex-direction:row;
  background:#e8eaed;
  border-top:1px solid var(--border);
  padding-bottom:var(--safe-bottom);
  flex-shrink:0;
  overflow-x:auto;
  overflow-y:hidden;
  scrollbar-width:none;
  -ms-overflow-style:none;
  scroll-snap-type:x mandatory;
}
.bottom-nav::-webkit-scrollbar{display:none}
.nav-btn{
  flex:0 0 auto;
  min-width:64px;
  display:flex;flex-direction:column;align-items:center;
  gap:2px;padding:8px 4px 6px;
  background:none;border:none;color:var(--muted2);
  font-size:9px;font-family:'Syne',sans-serif;font-weight:600;
  cursor:pointer;transition:color .15s;position:relative;
  -webkit-tap-highlight-color:transparent;
  scroll-snap-align:start;
}
.nav-btn.active{color:var(--accent)}
.nav-btn .nav-icon{font-size:20px;line-height:1}
.nav-dot{
  position:absolute;top:8px;right:calc(50% - 16px);
  width:8px;height:8px;border-radius:50%;
  background:var(--red);border:2px solid var(--surface);
}

/* ── PAGE BASE ───────────────────────────────────────── */
.page{display:none;padding:0}
.page.active{display:block}

.page-hero{
  padding:20px 16px 16px;
  background:linear-gradient(180deg,#f2f4f6 0%,transparent 100%);
  border-bottom:1px solid var(--border);
  margin-bottom:16px;
}
.page-tag{font-size:10px;font-family:var(--mono);color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.page-title{font-size:24px;font-weight:800}

.px{padding-left:16px;padding-right:16px}

/* ── CARDS ───────────────────────────────────────────── */
.card{background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;margin:0 16px 14px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:13px;font-weight:700}
.card-sub{font-size:10px;color:var(--muted2);font-family:var(--mono);margin-top:2px}
.card-body{padding:16px}

/* ── STAT ROW ────────────────────────────────────────── */
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px;margin-bottom:14px}
.stat-box{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.stat-label{font-size:9px;font-family:var(--mono);color:var(--muted2);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.stat-value{font-size:22px;font-weight:800;line-height:1}
.stat-sub{font-size:10px;color:var(--muted2);font-family:var(--mono);margin-top:4px}

/* ── PROGRESS ────────────────────────────────────────── */
.progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;border-radius:2px;transition:width .5s}

/* ── BADGES ──────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-family:var(--mono);font-weight:600;padding:3px 7px;border-radius:3px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.badge-ok{background:var(--green-dim);color:var(--green)}
.badge-warning{background:var(--yellow-dim);color:var(--yellow)}
.badge-critical{background:var(--red-dim);color:var(--red)}
.badge-expired{background:var(--red-dim);color:var(--red);border:1px solid var(--red)}
.badge-empty{background:var(--border);color:var(--muted2)}
.badge-blue{background:var(--blue-dim);color:var(--blue)}

/* ── ALERT BANNERS ───────────────────────────────────── */
.alert-banner{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-radius:8px;margin:0 16px 10px;border:1px solid}
.alert-banner.critical{background:var(--red-dim);border-color:rgba(240,92,92,.3)}
.alert-banner.warning{background:var(--yellow-dim);border-color:rgba(245,200,66,.3)}
.alert-banner.ok{background:var(--green-dim);border-color:rgba(61,214,140,.3)}
.alert-icon{font-size:20px;flex-shrink:0}
.alert-text{font-size:13px;font-weight:700}
.alert-sub{font-size:11px;color:var(--muted2);font-family:var(--mono);margin-top:2px}

function loadVault() {
  try {
    const r = localStorage.getItem(GDRIVE_KEY);
    return r ? JSON.parse(r) : [...GDRIVE_DOCS];
  } catch { return [...GDRIVE_DOCS]; }
}

function saveVault(files) {
  try { localStorage.setItem(GDRIVE_KEY, JSON.stringify(files)); } catch(e) { showToast('⚠ Storage full — delete old documents'); }
}

function getFileExt(name) { return (name.split('.').pop() || '').toLowerCase(); }
function getFileIcon(name) { return FILE_ICONS[getFileExt(name)] || '📁'; }
function fmtSize(bytes) { if (bytes < 1024) return bytes + ' B'; if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB'; return (bytes/1024/1024).toFixed(1) + ' MB'; }

function handleFileUpload(event) { event.target.value = ''; openAddDocModal(); }
function downloadFile(id) { const vault = loadVault(); const file = vault.find(f => f.id === id); if (!file) return; if (file.url) window.open(file.url.replace('/preview',''),'_blank'); }
function viewFile(id) { const vault = loadVault(); const file = vault.find(f => f.id === id); if (!file) return; if (file.url) viewGDriveDoc(file.url); }

function deleteFile(id) { if (!confirm('Delete this document?')) return; const vault = loadVault().filter(f => f.id !== id); saveVault(vault); showToast('🗑 Deleted'); renderVault(); }
function changeCat(id, newCat) { const vault = loadVault(); const file = vault.find(f => f.id === id); if (file) { file.category = newCat; saveVault(vault); renderVault(); } }

function renderVault() { renderGDriveVault(); }

function convertGDriveLink(url) {
  if (!url) return '';
  const fileMatch = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
  const openMatch = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  const docsMatch = url.match(/\/document\/d\/([a-zA-Z0-9_-]+)/);
  const sheetsMatch = url.match(/\/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
  const slidesMatch = url.match(/\/presentation\/d\/([a-zA-Z0-9_-]+)/);
  const id = (fileMatch || openMatch || docsMatch || sheetsMatch || slidesMatch)?.[1];
  if (id) return `https://drive.google.com/file/d/${id}/preview`;
  return url;
}

function viewGDriveDoc(url) { if (!url) { alert('No Google Drive link added yet.\nUpload to drive.google.com and paste the share link.'); return; } window.open(url, '_blank'); }

function openAddDocModal() { const modal = document.getElementById('gdriveAddModal'); if (!modal) return showToast('Modal not found'); document.getElementById('gdriveName').value = ''; document.getElementById('gdriveCategory').value = 'Formation'; document.getElementById('gdriveUrl').value = ''; document.getElementById('gdriveNotes').value = ''; document.getElementById('gdriveCurrentId').value = ''; modal.style.display = 'flex'; }
function closeAddDocModal() { const modal = document.getElementById('gdriveAddModal'); if (modal) modal.style.display = 'none'; }

function saveGDriveDoc() {
  const name = document.getElementById('gdriveName')?.value?.trim();
  const category = document.getElementById('gdriveCategory')?.value || 'Other';
  let url = document.getElementById('gdriveUrl')?.value?.trim() || '';
  const notes = document.getElementById('gdriveNotes')?.value?.trim() || '';
  const currentId = document.getElementById('gdriveCurrentId')?.value || '';
  if (!name) return showToast('Enter document name');
  url = convertGDriveLink(url);
  const docs = loadVault();
  if (currentId) { const doc = docs.find(d => String(d.id) === String(currentId)); if (doc) { doc.name = name; doc.category = category; doc.url = url; doc.notes = notes; doc.addedAt = doc.addedAt || new Date().toISOString(); saveVault(docs); closeAddDocModal(); renderVault(); showToast('✓ Document updated'); return; } }
  const id = Date.now() + Math.floor(Math.random()*1000);
  docs.push({ id, name, category, url, notes, addedAt: new Date().toISOString() }); saveVault(docs); closeAddDocModal(); renderVault(); showToast('✓ Document added');
}

function editGDriveDoc(id) { const docs = loadVault(); const doc = docs.find(d => d.id === id); if (!doc) return; document.getElementById('gdriveName').value = doc.name; document.getElementById('gdriveCategory').value = doc.category; document.getElementById('gdriveUrl').value = doc.url; document.getElementById('gdriveNotes').value = doc.notes; document.getElementById('gdriveCurrentId').value = id; const modal = document.getElementById('gdriveAddModal'); if (modal) modal.style.display = 'flex'; }

function renderGDriveVault() {
  let docs = loadVault();
  const search = (document.getElementById('vaultSearch')?.value || '').toLowerCase();
  if (vaultFilter !== 'All') docs = docs.filter(d => d.category === vaultFilter);
  if (search) docs = docs.filter(d => (d.name||'').toLowerCase().includes(search) || (d.notes||'').toLowerCase().includes(search));
  const allDocs = loadVault();
  const cats = FILE_CATEGORIES.filter(c => c === 'All' || allDocs.some(d => d.category === c));
  document.getElementById('vaultFilters').innerHTML = cats.map(c => `<button class="filter-btn ${vaultFilter === c ? 'active' : ''}" onclick="vaultFilter='${c}';renderGDriveVault()">${c}</button>`).join('');
  const info = document.getElementById('storageInfo'); if (info) info.textContent = allDocs.length + ' document' + (allDocs.length !== 1 ? 's' : '');
  const list = document.getElementById('vaultFileList'); if (!list) return;
  if (!docs.length) { list.innerHTML = '<div class="empty-vault">📂 No documents yet. Click "Add Document" to link files from Google Drive.</div>'; renderRequiredDocsList(); return; }
  list.innerHTML = docs.map(doc => `\n    <div class="file-item" style="border-left: 4px solid ${CAT_COLORS[doc.category] || '#999'}">\n      <div class="file-header">\n        <span class="file-cat-icon" style="color: ${CAT_COLORS[doc.category] || '#999'}">${CAT_ICONS[doc.category] || '📄'}</span>\n        <div class="file-info">\n          <div class="file-name">${doc.name}</div>\n          <div class="file-meta">\n            ${doc.category} · ${new Date(doc.addedAt).toLocaleDateString()}${doc.notes ? ` · ${doc.notes}` : ''}\n          </div>\n        </div>\n      </div>\n      <div class="file-actions">\n        ${doc.url ? `<button class="btn btn-sm btn-primary" onclick="viewGDriveDoc('${doc.url.replace(/'/g,"\\'" )})" title="View">👁 View</button>` : ''}\n        <button class="btn btn-sm" onclick="editGDriveDoc(${doc.id})" title="Edit">✏ Edit</button>\n        <button class="btn btn-danger btn-sm" onclick="deleteFile(${doc.id})" title="Delete">✕</button>\n      </div>\n    </div>\n  `).join('');
  renderRequiredDocsList();
}

function renderRequiredDocsList() { const docs = loadVault(); const list = document.getElementById('vaultRequiredList'); if (!list) return; const linked = new Set(docs.map(d => REQUIRED_DOCS.find(r => r.id === d.id)?.id).filter(Boolean)); let reqHtml = `<div style="padding: 16px; border-bottom: 1px solid var(--border);">\n      <div style="font-size: 13px; color: var(--muted); margin-bottom: 12px; font-weight: 600;">📋 REQUIRED DOCUMENTS — ${linked.size}/${REQUIRED_DOCS.length}</div>\n      <div style="display: grid; gap: 8px;">`; reqHtml += REQUIRED_DOCS.map(req => { const hasDoc = linked.has(req.id); return `<div style="display: flex; align-items: center; gap: 8px; padding: 8px; background: ${hasDoc ? 'rgba(22, 102, 56, 0.1)' : 'rgba(181, 42, 28, 0.05)'}; border-radius: 6px; font-size: 12px;"> <span style="font-size: 16px;">${hasDoc ? '✓' : '✗'}</span> <span>${req.label}</span> ${!hasDoc ? `<button class="btn btn-sm btn-primary" onclick="openAddDocModal()" style="margin-left: auto;">+</button>` : ''} </div>`; }).join(''); reqHtml += `</div></div>`; list.innerHTML = reqHtml; }

// ── HELPERS ───────────────────────────────────────────────────────
function daysUntil(d) {
  if (!d) return null;
  const exp = new Date(d); const today = new Date();
  today.setHours(0,0,0,0); exp.setHours(0,0,0,0);
  return Math.round((exp - today) / 86400000);
}

function statusFromDays(d) {
  if (d === null) return 'empty';
  if (d < 0) return 'expired';
  if (d <= 30) return 'critical';
  if (d <= 60) return 'warning';
  return 'ok';
}

function badgeHtml(status, days) {
  const map = { ok:'badge-ok|Current', warning:'badge-warning|Renew Soon', critical:'badge-critical|Urgent!', expired:'badge-expired|EXPIRED', empty:'badge-empty|Not Set' };
  const [cls, label] = (map[status] || map.empty).split('|');
  return `<span class="badge ${cls}">${label}</span>`;
}

function fmtDate(d) {
  if (!d) return '—';
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
}

function fmtMoney(v) { return '$' + Number(v||0).toLocaleString(); }

function getAlerts() {
  const alerts = [];
  D.insurance.forEach(ins => {
    const days = daysUntil(ins.expiry);
    const st = statusFromDays(days);
    if ((st === 'critical' || st === 'expired') && ins.expiry)
      alerts.push({ label: ins.type, days, status: st });
  });
  const sosDays = daysUntil(D.settings.siDue);
  const sosSt = statusFromDays(sosDays);
  if ((sosSt === 'critical' || sosSt === 'expired') && D.settings.siDue)
    alerts.push({ label: 'Statement of Information SI-200', days: sosDays, status: sosSt });
  return alerts;
}

let currentPage = 'dashboard';

function goPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.getElementById('nav-' + page).classList.add('active');
  document.getElementById('scrollArea').scrollTop = 0;
  currentPage = page;
  render();
}

// ── MODALS ────────────────────────────────────────────────────────
function openModal(id) {
  document.getElementById(id).classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  document.body.style.overflow = '';
}

// Close modal on backdrop click
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) closeModal(el.id); });
});

// ── TOAST ─────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg || '✓ Saved';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

// ── RENDER ────────────────────────────────────────────────────────
function render() {
  const alerts = getAlerts();
  renderHeader(alerts);
  if (currentPage === 'dashboard') renderDashboard(alerts);
  if (currentPage === 'compliance') renderCompliance(alerts);
  if (currentPage === 'insurance') renderInsurance();
  if (currentPage === 'distributions') renderDistributions();
  if (currentPage === 'checklist') renderChecklist();
  if (currentPage === 'settings') renderSettings();
  if (currentPage === 'documents') renderDocuments();
  if (currentPage === 'vault') renderVault();
  if (currentPage === 'vendors') renderVendors();
}

function renderHeader(alerts) {
    const pill = document.getElementById('alertPill');
    const dot = document.getElementById('complianceDot');
    if (alerts.length > 0) {
      if (pill) {
        pill.style.display = 'block';
        pill.textContent = alerts.length + ' alert' + (alerts.length > 1 ? 's' : '');
      }
      if (dot) dot.style.display = 'block';
    } else {
      if (pill) pill.style.display = 'none';
      if (dot) dot.style.display = 'none';
    }
}

        <div>

        </div>
      </div>`).join('');

  document.getElementById('statAlerts').textContent = alerts.length;
  document.getElementById('statAlerts').style.color = alerts.length > 0 ? 'var(--red)' : 'var(--green)';
  document.getElementById('statChecklist').textContent = pct + '%';

function renderCompliance(alerts) {
  const allItems = [
    { icon:'🏛', name:'Statement of Information (SI-200)', provider:'CA Secretary of State', expiry: D.settings.siDue },
    ...D.insurance.map(i => ({ icon: i.icon, name: i.type, provider: i.provider || '—', expiry: i.expiry, policy: i.policy }))
  ];

  // Alert banners
  const ca = document.getElementById('complianceAlerts');
  if (alerts.length === 0) {
    ca.innerHTML = `<div class="alert-banner ok" style="margin-top:14px"><div class="alert-icon">✅</div><div><div class="alert-text" style="color:var(--green)">All items current</div><div class="alert-sub">No expirations within 60 days</div></div></div>`;
  } else {
    ca.innerHTML = '<div style="height:14px"></div>' + alerts.map(a => `
      <div class="alert-banner ${a.status === 'expired' ? 'critical' : a.status}">
        <div class="alert-icon">${a.status === 'expired' ? '🚨' : '⚠️'}</div>
        <div><div class="alert-text">${a.label}</div>
        <div class="alert-sub">${a.status === 'expired' ? `EXPIRED ${Math.abs(a.days)} days ago` : `${a.days} days remaining`}</div></div>
      </div>`).join('');
  }

  // List
  document.getElementById('complianceList').innerHTML = allItems.map(item => {
    const days = daysUntil(item.expiry);
    const st = statusFromDays(days);
    const daysColor = st === 'ok' ? 'var(--green)' : st === 'warning' ? 'var(--yellow)' : st === 'empty' ? 'var(--muted2)' : 'var(--red)';
    return `<div class="row">
      <div>
        <div class="row-label">${item.icon} ${item.name}</div>
        <div class="row-sub">${item.provider}${item.policy ? ' · ' + item.policy : ''}</div>
        <div class="row-sub">${fmtDate(item.expiry)}</div>
      </div>
      <div class="row-right" style="flex-direction:column;align-items:flex-end;gap:4px">
        ${badgeHtml(st, days)}
        <span style="font-family:var(--mono);font-size:12px;font-weight:600;color:${daysColor}">
          ${days === null ? '—' : days < 0 ? Math.abs(days) + 'd ago' : days + 'd'}
        </span>
      </div>
    </div>`;
  }).join('');

  // Timeline
  const sorted = allItems.filter(i => i.expiry).sort((a,b) => new Date(a.expiry) - new Date(b.expiry));
  document.getElementById('timelineList').innerHTML = sorted.length === 0
    ? '<div style="padding:20px;color:var(--muted2);font-size:13px;font-family:var(--mono)">Set expiry dates to see timeline</div>'
    : sorted.map(item => {
      const days = daysUntil(item.expiry);
      const st = statusFromDays(days);
      const color = st === 'ok' ? 'var(--green)' : st === 'warning' ? 'var(--yellow)' : 'var(--red)';
      const pct = Math.max(0, Math.min(100, (days / 365) * 100));
      return `<div class="row">
        <div style="flex:1">
          <div class="row-label">${item.icon} ${item.name}</div>
          <div style="display:flex;align-items:center;gap:8px;margin-top:6px">
            <div style="flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden">
              <div style="width:${pct}%;height:100%;background:${color};border-radius:2px"></div>
            </div>
            <span style="font-size:10px;font-family:var(--mono);color:var(--muted2);white-space:nowrap">${fmtDate(item.expiry)}</span>
          </div>
        </div>
        <div style="margin-left:10px">${badgeHtml(st, days)}</div>
      </div>`;
    }).join('');
}

function renderInsurance() {

    return `<div class="card" style="border-color:${borderColor}">

function editInsurance(id) {
  const ins = D.insurance.find(i => i.id === id);
  if (!ins) return;
  document.getElementById('editInsTitle').textContent = `Edit — ${ins.type}`;
  document.getElementById('m_insId').value = id;
  document.getElementById('m_insProvider').value = ins.provider || '';
  document.getElementById('m_insPolicy').value = ins.policy || '';
  document.getElementById('m_insCoverage').value = ins.coverage || '';
  document.getElementById('m_insExpiry').value = ins.expiry || '';
  document.getElementById('m_insAgent').value = ins.agent || '';
  document.getElementById('m_insPhone').value = ins.agentPhone || '';
  openModal('editInsModal');
}

function saveInsurance() {
  const id = Number(document.getElementById('m_insId').value);
  D.insurance = D.insurance.map(ins => ins.id === id ? {
    ...ins,
    provider: document.getElementById('m_insProvider').value,
    policy: document.getElementById('m_insPolicy').value,
    coverage: document.getElementById('m_insCoverage').value,
    expiry: document.getElementById('m_insExpiry').value,
    agent: document.getElementById('m_insAgent').value,
    agentPhone: document.getElementById('m_insPhone').value,
  } : ins);
  save();
  closeModal('editInsModal');
  renderInsurance();
  render();
}

function renderDistributions() {
  const dists2025 = D.distributions.filter(d => d.year === '2025');
  const total2025 = dists2025.reduce((s, d) => s + Number(d.amount || 0), 0);
  document.getElementById('distTotal2025').textContent = fmtMoney(total2025);

function saveDistribution() {
  const amount = document.getElementById('m_amount').value;
  const date = document.getElementById('m_date').value;
  if (!amount || !date) { showToast('⚠ Fill amount & date'); return; }
  D.distributions.push({
    id: Date.now(),
    quarter: document.getElementById('m_quarter').value,
    year: document.getElementById('m_year').value,
    amount,
    date,
    notes: document.getElementById('m_notes').value,
    resolutionSigned: document.getElementById('m_resolution').checked,
    taxesSet: document.getElementById('m_taxes').checked,
  });
  save();
  closeModal('addDistModal');
  document.getElementById('m_amount').value = '';
  document.getElementById('m_date').value = '';
  document.getElementById('m_notes').value = '';
  document.getElementById('m_resolution').checked = false;
  document.getElementById('m_taxes').checked = false;
  renderDistributions();
}

function removeDistribution(id) {
  if (!confirm('Remove this distribution?')) return;
  D.distributions = D.distributions.filter(d => d.id !== id);
  save();
  renderDistributions();
}

function renderChecklist() {
  const YEAR = '2025';
  const done = CHECKLIST.filter(i => D.checklist[i.id + '_' + YEAR]).length;
  const pct = Math.round((done / CHECKLIST.length) * 100);
  document.getElementById('checkPct').textContent = pct + '%';
  document.getElementById('checkCount').textContent = `${done} of ${CHECKLIST.length} completed`;
  document.getElementById('checkBar').style.width = pct + '%';
  document.getElementById('checkBar').style.background = pct === 100 ? 'var(--green)' : 'var(--accent)';

  const groups = [
    { title:'Annual Tasks', items: CHECKLIST.filter(i => i.q === null) },
    { title:'Q1 Tasks', items: CHECKLIST.filter(i => i.q === 1) },
    { title:'Q2 Tasks', items: CHECKLIST.filter(i => i.q === 2) },
    { title:'Q3 Tasks', items: CHECKLIST.filter(i => i.q === 3) },
    { title:'Q4 Tasks', items: CHECKLIST.filter(i => i.q === 4) },
  ];

  document.getElementById('checklistContent').innerHTML = groups.map(g => {
    const gdone = g.items.filter(i => D.checklist[i.id + '_' + YEAR]).length;
    return `
      <div class="section-head">${g.title} (${gdone}/${g.items.length})</div>
      <div class="card">
        ${g.items.map(item => {
          const checked = !!D.checklist[item.id + '_' + YEAR];
          return `<div class="check-row ${checked ? 'done' : ''}" onclick="toggleCheck('${item.id}','${YEAR}')">
            <div class="check-box">${checked ? '✓' : ''}</div>
            <div class="check-text">
              <div class="check-label">${item.label}</div>
              <div class="check-due">Due: ${item.due}</div>
            </div>
          </div>`;
        }).join('')}
      </div>`;
  }).join('');
}

function toggleCheck(id, year) {
  const key = id + '_' + year;
  D.checklist[key] = !D.checklist[key];
  save();
  renderChecklist();
  // update dashboard stats if visible
  const dashAlertEl = document.getElementById('statChecklist');
  if (dashAlertEl) {
    const done = CHECKLIST.filter(i => D.checklist[i.id + '_' + year]).length;
    const pct = Math.round((done / CHECKLIST.length) * 100);
    dashAlertEl.textContent = pct + '%';
    document.getElementById('checklistBar').style.width = pct + '%';
    document.getElementById('statChecklistSub').textContent = `${done}/${CHECKLIST.length} done`;
  }
}

  const blob = new Blob([JSON.stringify(D, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `start_construction_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

  localStorage.removeItem(KEY);

  return docs.map(d => {
    const days = daysUntil(d.dueDate);
    d.days = days;
    d.status = days === null ? 'empty' : days < 0 ? 'overdue' : days <= 14 ? 'critical' : days <= 45 ? 'warning' : 'ok';
    return d;
  }).sort((a,b) => (a.days === null ? 999 : a.days) - (b.days === null ? 999 : b.days));
}

          <div class="vendor-body ${isOpen ? 'open' : ''}">
            ${v.account ? `<div class="vendor-field"><span class="vendor-field-label">Account</span><span class="vendor-field-value" style="font-weight:700">${v.account}</span></div>` : ''}
            ${v.email ? `<div class="vendor-field"><span class="vendor-field-label">Email</span><span class="vendor-field-value"><a href="mailto:${v.email}" style="color:var(--blue);text-decoration:none">${v.email}</a></span></div>` : ''}
            ${v.password ? `<div class="vendor-field"><span class="vendor-field-label">Password</span><span class="vendor-field-value" id="vpwd_${v.id}" style="letter-spacing:3px">••••••••</span><button onclick="togglePwd(${v.id},'${v.password}')" style="background:none;border:none;color:var(--blue);font-size:11px;cursor:pointer;margin-left:8px">Show</button></div>` : ''}
            ${v.url ? `<div class="vendor-field"><span class="vendor-field-label">Portal</span><span class="vendor-field-value"><a href="${v.url}" target="_blank" style="color:var(--blue);text-decoration:none">${v.url.replace('https://','')}</a></span></div>` : ''}
            ${v.notes ? `<div class="vendor-field"><span class="vendor-field-label">Notes</span><span class="vendor-field-value" style="color:var(--muted2);font-style:italic">${v.notes}</span></div>` : ''}
            <div style="display:flex;gap:8px;margin-top:12px">
              ${v.url ? `<a href="${v.url}" target="_blank" class="btn btn-primary btn-sm" style="text-decoration:none;flex:1;justify-content:center">🌐 Open Portal</a>` : ''}
              <button class="btn btn-ghost btn-sm" style="flex:1" onclick="editVendor(${v.id})">✏ Edit</button>
              <button class="btn btn-danger btn-sm" onclick="deleteVendor(${v.id})">✕</button>
            </div>
          </div>
        </div>`;
    });
  });

  if (vendors.length === 0) {
    html = '<div style="padding:32px 16px;text-align:center;color:var(--muted2);font-family:var(--mono);font-size:12px">No vendors found</div>';
  }

  document.getElementById('vendorList').innerHTML = html;
}

function toggleVendor(id) {
  vendorOpenId = vendorOpenId === id ? null : id;
  renderVendors();
}

function togglePwd(id, pwd) {
  const el = document.getElementById('vpwd_' + id);
  if (!el) return;
  if (el.textContent === '••••••••') {
    el.textContent = pwd;
    el.style.letterSpacing = 'normal';
  } else {
    el.textContent = '••••••••';
    el.style.letterSpacing = '3px';
  }
}

function editVendor(id) {
  const vendors = loadVendors();
  const v = vendors.find(x => x.id === id);
  if (!v) return;
  document.getElementById('ev_id').value = v.id;
  document.getElementById('ev_name').value = v.name;
  document.getElementById('ev_account').value = v.account || '';
  document.getElementById('ev_email').value = v.email || '';
  document.getElementById('ev_password').value = v.password || '';
  document.getElementById('ev_url').value = v.url || '';
  document.getElementById('ev_category').value = v.category || '';
  document.getElementById('ev_notes').value = v.notes || '';
  document.getElementById('ev_status').value = v.status || 'active';
  openModal('editVendorModal');
}

function saveVendorEdit() {
  const id = Number(document.getElementById('ev_id').value);
  const vendors = loadVendors();
  const idx = vendors.findIndex(v => v.id === id);
  if (idx === -1) return;
  vendors[idx] = {
    ...vendors[idx],
    name: document.getElementById('ev_name').value,
    account: document.getElementById('ev_account').value,
    email: document.getElementById('ev_email').value,
    password: document.getElementById('ev_password').value,
    url: document.getElementById('ev_url').value,
    category: document.getElementById('ev_category').value,
    notes: document.getElementById('ev_notes').value,
    status: document.getElementById('ev_status').value,
  };
  saveVendors(vendors);
  showToast('✓ Vendor saved');
  closeModal('editVendorModal');
  renderVendors();
}

function addNewVendor() {
  const name = document.getElementById('nv_name').value.trim();
  if (!name) return;
  const vendors = loadVendors();
  const colors = ['#e05c2a','#0066cc','#cc2200','#2a7a2a','#1a5fa8','#7a3fa0','#cc6600','#2a6b8a'];
  vendors.push({
    id: Date.now(),
    name,
    account: document.getElementById('nv_account').value,
    email: document.getElementById('nv_email').value,
    password: document.getElementById('nv_password').value,
    url: document.getElementById('nv_url').value,
    category: document.getElementById('nv_category').value || 'Other',
    notes: document.getElementById('nv_notes').value,
    status: document.getElementById('nv_status').value || 'active',
    color: colors[vendors.length % colors.length],
  });
  saveVendors(vendors);
  showToast('✓ Vendor added');
  closeModal('addVendorModal');
  ['nv_name','nv_account','nv_email','nv_password','nv_url','nv_category','nv_notes'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  renderVendors();
}

function deleteVendor(id) {
  if (!confirm('Delete this vendor?')) return;
  const vendors = loadVendors().filter(v => v.id !== id);
  saveVendors(vendors);
  if (vendorOpenId === id) vendorOpenId = null;
  renderVendors();
}


// ── VAULT ──────────────────────────────────────────────────────────

const GDRIVE_KEY = 'sc_gdrive_v2';
let vaultFilter = 'All';

// Required documents list (matches what's in the screenshot + more)
const REQUIRED_DOCS = [
  { id:'articles',      label:'Articles of Incorporation',          icon:'🏛', category:'Formation' },
  { id:'bylaws',        label:'Corporate Bylaws',                   icon:'📜', category:'Formation' },
  { id:'ein',           label:'EIN / Tax ID Number Letter',         icon:'🔢', category:'Formation' },
  { id:'2553',          label:'IRS Form 2553 (S-Corp Election)',    icon:'📋', category:'Formation' },
  { id:'statement_inc', label:'Statement of the Incorporator',      icon:'📄', category:'Formation' },
  { id:'biz_entity',    label:'Business Entity Filing Acknowledgment', icon:'📄', category:'Formation' },
  { id:'banking_res',   label:'Banking Resolution',                 icon:'🏦', category:'Formation' },
  { id:'meeting_min',   label:'Annual Meeting Minutes (current)',   icon:'🗓', category:'Corporate' },
  { id:'si200',         label:'Statement of Information (SI-200)',  icon:'🏛', category:'Corporate' },
  { id:'cslb_lic',      label:'CSLB Contractor License',            icon:'🔨', category:'Licenses' },
  { id:'cslb_bond',     label:"Contractor's Bond Certificate",      icon:'🔗', category:'Licenses' },
  { id:'gl_policy',     label:'General Liability Insurance Policy', icon:'🛡', category:'Insurance' },
  { id:'wc_policy',     label:'Workers Compensation Policy',        icon:'👷', category:'Insurance' },
  { id:'auto_policy',   label:'Commercial Auto Insurance',          icon:'🚗', category:'Insurance' },
  { id:'w2_current',    label:'W-2 Current Year (self)',            icon:'💵', category:'Tax' },
  { id:'1120s_current', label:'Form 1120-S Current Year',           icon:'📊', category:'Tax' },
  { id:'ca100s_current',label:'CA Form 100S Current Year',          icon:'📊', category:'Tax' },
  { id:'usps_1583',     label:'USPS Form 1583',                     icon:'📮', category:'Other' },
  { id:'epa608',        label:'EPA 608 Universal Certification',    icon:'♻️', category:'Licenses' },
  { id:'boir',          label:'BOIR (Beneficial Ownership Report)',  icon:'🏦', category:'Formation' },
];

const FILE_CATEGORIES = ['All', 'Formation', 'Corporate', 'Licenses', 'Insurance', 'Tax', 'Payroll', 'Contracts', 'Other'];

const FILE_ICONS = {
  'pdf':'🔴', 'doc':'🔵', 'docx':'🔵', 'xls':'🟢', 'xlsx':'🟢',
  'png':'🟣', 'jpg':'🟣', 'jpeg':'🟣', 'heic':'🟣', 'gif':'🟣',
  'txt':'⬜', 'csv':'🟢', 'zip':'🟡',
};

const CAT_COLORS = {
  'Formation':'#1450a0', 'Corporate':'#b56e00', 'Licenses':'#166638',
  'Insurance':'#8b2fc9', 'Tax':'#b52a1c', 'Payroll':'#0d7c66',
  'Contracts':'#c44b00', 'Other':'#5a6370'
};

function loadVault() {
  try {
    const r = localStorage.getItem(VAULT_KEY);
    return r ? JSON.parse(r) : [];
  } catch { return []; }
}

function saveVault(files) {
  try { localStorage.setItem(VAULT_KEY, JSON.stringify(files)); } catch(e) {
    showToast('⚠ Storage full — delete old files');
  }
}

function getFileExt(name) {
  return (name.split('.').pop() || '').toLowerCase();
}

function getFileIcon(name) {
  return FILE_ICONS[getFileExt(name)] || '📁';
}

function fmtSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1024/1024).toFixed(1) + ' MB';
}

function handleFileUpload(event) {
  const files = Array.from(event.target.files);
  if (!files.length) return;
  const vault = loadVault();

  let loaded = 0;
  files.forEach(file => {
    if (file.size > 10 * 1024 * 1024) {
      showToast('⚠ ' + file.name + ' too large (max 10MB)');
      loaded++;
      if (loaded === files.length) renderVault();
      return;
    }
    const reader = new FileReader();
    reader.onload = e => {
      // Auto-detect category from filename
      const name = file.name.toLowerCase();
      let category = 'Other';
      if (name.match(/articles|bylaws|ein|2553|incorporat|banking.res|entity.fil/)) category = 'Formation';
      else if (name.match(/minutes|meeting|si.?200|statement.of.info|resolution/)) category = 'Corporate';
      else if (name.match(/cslb|license|bond|permit/)) category = 'Licenses';
      else if (name.match(/insurance|liability|workers.?comp|wc|auto.ins|policy|umbrella/)) category = 'Insurance';
      else if (name.match(/1120|100s|w.?2|1040|tax.return|941|de.?9|k.?1|1099/)) category = 'Tax';
      else if (name.match(/payroll|paystub|pay.stub|gusto|w.?9/)) category = 'Payroll';
      else if (name.match(/contract|agreement|proposal|bid/)) category = 'Contracts';

      const entry = {
        id: Date.now() + Math.random(),
        name: file.name,
        size: file.size,
        type: file.type,
        category,
        uploadedAt: new Date().toISOString(),
        data: e.target.result,
        linkedReqId: null,
      };

      // Auto-link to required doc
      const fname = file.name.toLowerCase();
      REQUIRED_DOCS.forEach(req => {
        if (req.id === 'articles' && fname.match(/articles/)) entry.linkedReqId = req.id;
        else if (req.id === 'bylaws' && fname.match(/bylaw/)) entry.linkedReqId = req.id;
        else if (req.id === 'ein' && fname.match(/ein|tax.id/)) entry.linkedReqId = req.id;
        else if (req.id === '2553' && fname.match(/2553/)) entry.linkedReqId = req.id;
        else if (req.id === 'banking_res' && fname.match(/banking/)) entry.linkedReqId = req.id;
        else if (req.id === 'meeting_min' && fname.match(/minutes|meeting/)) entry.linkedReqId = req.id;
        else if (req.id === 'si200' && fname.match(/si.?200|statement.of.info/)) entry.linkedReqId = req.id;
        else if (req.id === 'cslb_lic' && fname.match(/cslb|license/)) entry.linkedReqId = req.id;
        else if (req.id === 'gl_policy' && fname.match(/liability/)) entry.linkedReqId = req.id;
        else if (req.id === 'usps_1583' && fname.match(/1583/)) entry.linkedReqId = req.id;
      });

      vault.push(entry);
      loaded++;
      if (loaded === files.length) {
        saveVault(vault);
        showToast('✓ ' + files.length + ' file' + (files.length > 1 ? 's' : '') + ' saved');
        renderVault();
      }
    };
    reader.readAsDataURL(file);
  });

  event.target.value = '';
}

function downloadFile(id) {
  const vault = loadVault();
  const file = vault.find(f => f.id === id);
  if (!file) return;
  const a = document.createElement('a');
  a.href = file.data;
  a.download = file.name;
  a.click();
}

function viewFile(id) {
  const vault = loadVault();
  const file = vault.find(f => f.id === id);
  if (!file) return;
  const ext = getFileExt(file.name);
  if (['png','jpg','jpeg','gif','webp','heic'].includes(ext) || file.type.startsWith('image/')) {
    const w = window.open();
    w.document.write('<html><body style="margin:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh"><img src="' + file.data + '" style="max-width:100%;max-height:100vh"></body></html>');
  } else if (ext === 'pdf' || file.type === 'application/pdf') {
    const w = window.open();
    w.document.write('<html><body style="margin:0"><embed src="' + file.data + '" width="100%" height="100%" type="application/pdf"></body></html>');
  } else {
    downloadFile(id);
  }
}

function deleteFile(id) {
  if (!confirm('Delete this file?')) return;
  const vault = loadVault().filter(f => f.id !== id);
  saveVault(vault);
  showToast('🗑 Deleted');
  renderVault();
}

function changeCat(id, newCat) {
  const vault = loadVault();
  const file = vault.find(f => f.id === id);
  if (file) { file.category = newCat; saveVault(vault); renderVault(); }
}

function renderVault() {
  let vault = loadVault();
  const search = (document.getElementById('vaultSearch')?.value || '').toLowerCase();

  // Storage info
  const totalSize = vault.reduce((s, f) => s + (f.size || 0), 0);
  document.getElementById('storageInfo').textContent =
    vault.length + ' file' + (vault.length !== 1 ? 's' : '') + ' · ' + fmtSize(totalSize);

  // Category filters
  const cats = FILE_CATEGORIES.filter(c => c === 'All' || vault.some(f => f.category === c));
  document.getElementById('vaultFilters').innerHTML = cats.map(c =>
    `<button class="filter-btn ${vaultFilter === c ? 'active' : ''}" onclick="vaultFilter='${c}';renderVault()">${c}</button>`
  ).join('');

  // Filter files
  let filtered = vault;
  if (vaultFilter !== 'All') filtered = filtered.filter(f => f.category === vaultFilter);
  if (search) filtered = filtered.filter(f => f.name.toLowerCase().includes(search));

  // Sort by upload date desc
  filtered.sort((a,b) => new Date(b.uploadedAt) - new Date(a.uploadedAt));

  const list = document.getElementById('vaultFileList');

  if (filtered.length === 0) {
    list.innerHTML = vault.length === 0
      ? `<div class="empty-vault">
          <div style="font-size:48px;margin-bottom:12px">📂</div>
          <div style="font-weight:700;font-size:14px;color:var(--text);margin-bottom:8px">Vault is empty</div>
          <div>Tap the upload area above<br>to add your company documents</div>
          <div style="margin-top:12px;padding:10px 14px;background:var(--surface2);border-radius:8px;text-align:left">
            From the screenshot, you have:<br>
            Articles of Incorporation<br>
            Banking Resolution<br>
            Corporate Bylaws<br>
            EIN / Tax ID Number<br>
            IRS Form 2553<br>
            Meeting Minutes<br>
            Statement of Information<br>
            …and more — upload them all here
          </div>
        </div>`
      : `<div class="empty-vault">No files match "${search || vaultFilter}"</div>`;
    return;
  }

  // Group by category
  const groups = {};
  filtered.forEach(f => {
    if (!groups[f.category]) groups[f.category] = [];
    groups[f.category].push(f);
  });

  let html = '';
  Object.keys(groups).forEach(cat => {
    const color = CAT_COLORS[cat] || 'var(--muted2)';
    html += `<div style="font-size:9px;font-family:var(--mono);font-weight:700;color:${color};text-transform:uppercase;letter-spacing:2px;padding:14px 16px 6px">${cat} (${groups[cat].length})</div>`;
    html += '<div class="card" style="margin-bottom:10px">';
    groups[cat].forEach(file => {
      const uploadDate = new Date(file.uploadedAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
      html += `
        <div class="file-row">
          <div class="file-icon-box" style="background:${color}18">${getFileIcon(file.name)}</div>
          <div class="file-info" onclick="viewFile(${file.id})" style="cursor:pointer">
            <div class="file-name">${file.name}</div>
            <div class="file-meta">${fmtSize(file.size)} · ${uploadDate} · ${file.category}</div>
          </div>
          <div class="file-actions">
            <button class="btn btn-ghost btn-sm" onclick="viewFile(${file.id})" title="View">👁</button>
            <button class="btn btn-ghost btn-sm" onclick="downloadFile(${file.id})" title="Download">⬇</button>
            <button class="btn btn-danger btn-sm" onclick="deleteFile(${file.id})" title="Delete">✕</button>
          </div>
        </div>`;
    });
    html += '</div>';
  });
  list.innerHTML = html;

  // Required docs checklist
  const uploadedReqIds = new Set(vault.map(f => f.linkedReqId).filter(Boolean));
  const linkedNames = new Set();
  vault.forEach(f => {
    if (f.linkedReqId) linkedNames.add(f.name.toLowerCase());
  });

  // Also fuzzy-match by filename for display
  function isUploaded(req) {
    if (uploadedReqIds.has(req.id)) return true;
    const n = req.label.toLowerCase();
    return vault.some(f => {
      const fn = f.name.toLowerCase();
      if (req.id === 'articles') return fn.includes('articles');
      if (req.id === 'bylaws') return fn.includes('bylaw');
      if (req.id === 'ein') return fn.includes('ein') || fn.includes('tax id');
      if (req.id === '2553') return fn.includes('2553');
      if (req.id === 'meeting_min') return fn.includes('minute') || fn.includes('meeting');
      if (req.id === 'si200') return fn.includes('si-200') || fn.includes('si200') || fn.includes('statement of info');
      if (req.id === 'cslb_lic') return fn.includes('cslb') || fn.includes('license');
      if (req.id === 'banking_res') return fn.includes('banking');
      if (req.id === 'usps_1583') return fn.includes('1583');
      if (req.id === 'biz_entity') return fn.includes('entity') || fn.includes('acknowledgm');
      if (req.id === 'statement_inc') return fn.includes('incorporat');
      return false;
    });
  }

  const catGroups = {};
  REQUIRED_DOCS.forEach(req => {
    if (!catGroups[req.category]) catGroups[req.category] = [];
    catGroups[req.category].push(req);
  });

  let reqHtml = '';
  const uploadedCount = REQUIRED_DOCS.filter(r => isUploaded(r)).length;
  reqHtml += `<div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
    <span style="font-size:13px;font-weight:700">${uploadedCount}/${REQUIRED_DOCS.length} documents uploaded</span>
    <span style="font-size:11px;font-family:var(--mono);color:var(--muted2)">${REQUIRED_DOCS.length - uploadedCount} missing</span>
  </div>
  <div style="padding:4px 16px 4px;height:4px;background:var(--border)">
    <div style="height:4px;background:var(--green);width:${Math.round(uploadedCount/REQUIRED_DOCS.length*100)}%;transition:width .5s;border-radius:2px"></div>
  </div>`;

  Object.keys(catGroups).forEach(cat => {
    const color = CAT_COLORS[cat] || 'var(--muted2)';
    reqHtml += `<div style="font-size:9px;font-family:var(--mono);font-weight:700;color:${color};text-transform:uppercase;letter-spacing:2px;padding:12px 16px 4px;border-top:1px solid var(--border)">${cat}</div>`;
    catGroups[cat].forEach(req => {
      const uploaded = isUploaded(req);
      reqHtml += `
        <div class="req-row">
          <div class="req-check ${uploaded ? 'uploaded' : 'missing'}">${uploaded ? '✓' : '?'}</div>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:${uploaded?'600':'700'};color:${uploaded?'var(--muted2)':'var(--text)'}">${req.label}</div>
          </div>
          ${!uploaded ? `<label style="cursor:pointer" title="Upload this file">
            <input type="file" style="display:none" onchange="handleFileUpload(event)">
            <span class="btn btn-ghost btn-sm">Upload</span>
          </label>` : '<span style="font-size:12px;color:var(--green)">✓</span>'}
        </div>`;
    });
  });

  document.getElementById('vaultRequiredList').innerHTML = reqHtml;
}

// Drag & drop support
document.addEventListener('DOMContentLoaded', () => {
  const label = document.getElementById('uploadLabel');
  if (!label) return;
  ['dragenter','dragover'].forEach(e => label.addEventListener(e, ev => { ev.preventDefault(); label.classList.add('drag-over'); }));
  ['dragleave','drop'].forEach(e => label.addEventListener(e, ev => { ev.preventDefault(); label.classList.remove('drag-over'); }));
  label.addEventListener('drop', ev => {
    const dt = ev.dataTransfer;
    if (dt && dt.files.length) {
      const fakeEvent = { target: { files: dt.files, value:'' } };
      handleFileUpload(fakeEvent);
    }
  });
});

// ── INIT ──────────────────────────────────────────────────────────
render();
</script>
